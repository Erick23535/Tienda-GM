<ion-content class="ion-padding">
  <div class="login-container">

    <div class="logo-area">
      <h1>Tienda GM</h1>
      <p>Panel de administración</p>
    </div>

    <ion-card>
      <ion-card-content>

        <ion-item>
          <ion-label position="floating">Correo electrónico</ion-label>
          <ion-input type="email" [(ngModel)]="correo" autocomplete="email"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Contraseña</ion-label>
          <ion-input type="password" [(ngModel)]="contrasena"></ion-input>
        </ion-item>

        <ion-button expand="block" (click)="iniciarSesion()" class="ion-margin-top">
          Ingresar
        </ion-button>

      </ion-card-content>
    </ion-card>

  </div>
</ion-content>
