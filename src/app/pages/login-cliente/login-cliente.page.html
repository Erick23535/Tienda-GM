<ion-content>
  <div class="login-wrapper">
    <div class="bg-gradient"></div>

    <div class="login-container">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-icon">
          <ion-icon name="bag-handle-outline"></ion-icon>
        </div>
        <h1 class="brand-name">TIENDA GM</h1>
        <p class="brand-sub">Tu tienda de moda favorita</p>
      </div>

      <!-- Card -->
      <div class="login-card">

        <h2 class="card-title">Hola de nuevo</h2>
        <p class="card-subtitle">Inicia sesión en tu cuenta</p>

        <div class="input-group">
          <div class="input-icon">
            <ion-icon name="mail-outline"></ion-icon>
          </div>
          <ion-input
            class="custom-input"
            type="email"
            placeholder="Correo electrónico"
            [(ngModel)]="correo">
          </ion-input>
        </div>

        <div class="input-group">
          <div class="input-icon">
            <ion-icon name="lock-closed-outline"></ion-icon>
          </div>
          <ion-input
            class="custom-input"
            type="password"
            placeholder="Contraseña"
            [(ngModel)]="contrasena">
          </ion-input>
        </div>

        <div class="forgot-link" routerLink="/recuperar-contrasena">
          ¿Olvidaste tu contraseña?
        </div>

        <button class="btn-login" (click)="iniciarSesion()">
          <span>Ingresar</span>
          <ion-icon name="arrow-forward-outline"></ion-icon>
        </button>

        <div class="divider">
          <span>¿No tienes cuenta?</span>
        </div>

        <button class="btn-outline" routerLink="/registro-cliente">
          <ion-icon name="person-add-outline"></ion-icon>
          <span>Crear cuenta nueva</span>
        </button>

        <button class="btn-ghost" routerLink="/login">
          <span>Acceso administración</span>
        </button>

      </div>
    </div>
  </div>
</ion-content>
